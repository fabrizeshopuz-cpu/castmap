<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FABRIZE TV Player</title>
    <link rel="stylesheet" href="tv.css" />
  </head>
  <body>
    <main id="tvStage">
      <header class="tv-header">
        <div class="tv-brand">
          <strong>FABRIZE</strong>
          <span>SOTUV - NATIJA - RIVOJLANISH</span>
        </div>
        <time id="clock">--:--</time>
      </header>

      <section class="screen">
        <div class="empty" id="emptyState">
          <strong>FABRIZE TV</strong>
          <span>Bu qurilmaga kontent biriktirilmagan.</span>
          <small id="deviceLabel"></small>
        </div>
        <img id="imagePlayer" alt="FABRIZE rasm kontenti" />
        <video id="videoPlayer" autoplay muted playsinline></video>
        <iframe id="youtubePlayer" title="YouTube kontent" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="musicPlayer" id="musicPlayer">
          <b>FABRIZE MOTIVATION</b>
          <span id="musicTitle">MP3 kontent</span>
          <audio id="audioPlayer" autoplay></audio>
        </div>
      </section>

      <section class="playlist" id="playlistStrip"></section>
      <footer class="ticker">Bugungi maqsad - ertangi natija! Reja - intizom - natija!</footer>
      <div class="badge" id="statusBadge">Ulanmoqda...</div>
    </main>
    <script src="tv.js"></script>
  </body>
</html>
