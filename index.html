<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CASTMAP Admin Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img src="assets/castmap-logo.png" alt="CASTMAP" />
          <span>Retail Media Infrastructure Platform</span>
        </div>

        <nav class="menu" id="menu" aria-label="Admin bo'limlari">
          <button class="active" type="button" data-page="dashboard"><span>DB</span>Dashboard</button>
          <button type="button" data-page="devices"><span>TV</span>TV Qurilmalar</button>
          <button type="button" data-page="screens"><span>EK</span>Ekranlar</button>
          <button type="button" data-page="content"><span>MK</span>Media kutubxona</button>
          <button type="button" data-page="playlists"><span>PL</span>Playlistlar</button>
          <button type="button" data-page="schedule"><span>JD</span>Jadval</button>
          <button type="button" data-page="campaigns"><span>KP</span>Kampaniyalar</button>
          <button type="button" data-page="stats"><span>AN</span>Analitika</button>
          <button type="button" data-page="alerts"><span>OG</span>Ogohlantirishlar</button>
          <button type="button" data-page="apps"><span>IW</span>Ilovalar va Widgetlar</button>
          <button type="button" data-page="users"><span>FO</span>Foydalanuvchilar</button>
          <button type="button" data-page="settings"><span>SO</span>Sozlamalar</button>
        </nav>

        <div class="plan-card">
          <b>PRO PLAN</b>
          <span>Tarif: Professional</span>
          <small>Keyingi to'lov: 15.06.2026</small>
          <button type="button" data-page="sales">Tarifni boshqarish</button>
        </div>

        <div class="admin-profile">
          <span>SA</span>
          <div>
            <b>Super Admin</b>
            <small>superadmin@castmap.uz</small>
          </div>
        </div>

        <button class="logout" type="button" data-admin-logout>Chiqish</button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p>CASTMAP</p>
            <h1>Retail Media Infrastructure Platform</h1>
          </div>
          <div class="top-actions">
            <label class="top-search"><span>Qidirish</span><input type="search" placeholder="Qidirish..." /></label>
            <button class="icon-button" type="button" aria-label="Bildirishnomalar">!</button>
            <button class="icon-button" type="button" aria-label="Yordam">?</button>
            <button class="theme-toggle" type="button" aria-label="Light/Dark">☼ ●</button>
            <button class="ghost-button date-filter" type="button">17 May, 2026 - 17 May, 2026</button>
          </div>
        </header>

        <section class="page" id="page"></section>
      </section>
    </main>

    <div class="modal-backdrop hidden" id="modalBackdrop">
      <section class="modal" id="modal"></section>
    </div>

    <div class="toast hidden" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
